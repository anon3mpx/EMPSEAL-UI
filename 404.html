<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>EMPX - Page Not Found</title>
    <script type="text/javascript">
        // For single-page applications, redirect to root so React Router can handle routing
        // Preserve the original path so the app can potentially show a 404 page
        var currentPath = window.location.pathname;
        var currentSearch = window.location.search;
        var currentHash = window.location.hash;
        
        // Redirect to root with hash to preserve the original path
        window.location.replace("/" + currentHash);
    </script>
</head>
<body>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist.</p>
    <p><a href="/">Return to Home</a></p>
</body>
</html>
